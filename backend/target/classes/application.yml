spring:
  application:
    name: smartinsight
  datasource:
    url: jdbc:postgresql://localhost:5432/smartinsight
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

gemini:
  api:
    key: ${GEMINI_API_KEY:demo_key_for_now}
    url: https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=

server:
  port: 8080
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB
